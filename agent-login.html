<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agent Verification Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Supabase JS Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    h1 { 
      margin-bottom: 10px; 
      font-size: 24px; 
    }
    
    p { 
      color: #555; 
      margin-bottom: 25px; 
    }

    input { 
      width: 100%; 
      padding: 12px; 
      margin-bottom: 15px; 
      border-radius: 6px; 
      border: 1px solid #ddd; 
      font-size: 14px; 
      box-sizing: border-box;
    }

    button { 
      width: 100%; 
      padding: 12px; 
      background: #111; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      font-size: 15px; 
      cursor: pointer;
      margin-bottom: 10px;
    }

    button:hover:not(:disabled) { 
      background: #000; 
    }

    button:disabled {
      background: #666;
      cursor: not-allowed;
    }

    .success { 
      margin-top: 15px; 
      color: green; 
      display: none; 
    }

    .error { 
      margin-top: 15px; 
      color: red; 
      display: none; 
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Agent Login</h1>
    <p>Enter your email and we’ll send you a secure login link.</p>

    <input type="email" id="email" placeholder="Enter your email address">
    <button id="loginButton">Send Login Link</button>

    <div class="success" id="success">Check your email for the login link.</div>
    <div class="error" id="error">Something went wrong. Try again.</div>
  </div>

  <script>
    // Initialize Supabase client (only once)
    const supabaseClient = window.supabase.createClient(
      "https://djvrdggtqabogzxtgleq.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdnJkZ2d0cWFib2d6eHRnbGVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzMxMTIsImV4cCI6MjA5MDYwOTExMn0.t2A2DcHpM78IIXO4en878aAASmKfvMkA75AhHwP5IMI"
    );

    let isLoading = false;

    async function login() {
      const emailInput = document.getElementById("email");
      const email = emailInput.value.trim();
      const button = document.getElementById("loginButton");
      const successDiv = document.getElementById("success");
      const errorDiv = document.getElementById("error");

      // Reset messages
      successDiv.style.display = "none";
      errorDiv.style.display = "none";

      if (!email) {
        alert("Please enter your email address.");
        return;
      }

      if (isLoading) return;

      // Show loading state
      isLoading = true;
      button.textContent = "Sending...";
      button.disabled = true;

      try {
        const { error } = await supabaseClient.auth.signInWithOtp({
          email: email,
          options: {
            emailRedirectTo: window.location.origin + "/agent-verify.html" // Optional: change if you have a verify page
          }
        });

        if (!error) {
          successDiv.style.display = "block";
          emailInput.value = ""; // Clear input after success
        } else {
          console.error("Supabase error:", error);
          errorDiv.style.display = "block";
        }
      } catch (err) {
        console.error("Unexpected error:", err);
        errorDiv.style.display = "block";
      } finally {
        // Reset button
        isLoading = false;
        button.textContent = "Send Login Link";
        button.disabled = false;
      }
    }

    // Attach event listener once DOM is loaded
    document.addEventListener("DOMContentLoaded", () => {
      const loginButton = document.getElementById("loginButton");
      loginButton.addEventListener("click", login);

      // Optional: Allow pressing Enter in the email field
      document.getElementById("email").addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          login();
        }
      });
    });
  </script>

</body>
</html>
